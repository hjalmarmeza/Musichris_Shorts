<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MusiChris Ministry Masterpiece v11.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream-color: #F5F5DC;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1920px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            overflow: hidden;
        }

        .container {
            width: 80%;
            max-width: 800px;
            background: rgba(10, 10, 5, 0.65);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            text-align: center;
            color: var(--cream-color);
            box-shadow: 0 50px 120px rgba(0,0,0,0.9);
            border: 1px solid rgba(245, 245, 220, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 70px;
        }

        .quote-container {
            font-family: var(--font-serif);
            width: 100%;
        }

        .quote { 
            font-size: 58px; 
            line-height: 1.5; 
            margin-bottom: 50px; 
            font-weight: 400;
        }

        .bible-citation { 
            font-family: var(--font-serif); 
            font-size: 40px; 
            font-style: italic; 
            opacity: 0.9;
        }

        .divider { width: 80px; height: 1px; background: var(--cream-color); margin: 40px auto; opacity: 0.3; }
        .footer-tag { font-family: var(--font-sans); letter-spacing: 6px; font-size: 20px; opacity: 0.4; font-weight: 300; }

        /* --- OUTRO EVOLUCIONADO --- */
        #outro { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; /* Cambio a inicio fijo */
            color: var(--cream-color);
            padding-top: 600px; /* Coordenada exacta para FFmpeg */
        }
        .logo-circle-hole { 
            width: 330px; 
            height: 330px; 
            margin-bottom: 60px; 
        }
        .channel-name { font-family: var(--font-serif); font-size: 78px; font-weight: 700; margin-bottom: 20px; }
        
        .cta-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 30px; }
        .cta-bubble { background: rgba(245, 245, 220, 0.15); padding: 35px 80px; border-radius: 100px; border: 1px solid rgba(245, 245, 220, 0.2); font-family: var(--font-serif); font-size: 44px; font-style: italic; backdrop-filter: blur(10px); }
        .cta-subtext { font-family: var(--font-sans); font-size: 30px; letter-spacing: 2px; opacity: 0.7; }

        body.outro #main-content { display: none; }
        body.outro #outro { display: flex; }
    </style>
</head>
<body class="<!-- MODE -->">
    <div id="main-content" class="container">
        <div class="quote-container">
            <div class="quote"><span><!-- Text injected here --></span></div>
        </div>
        <div class="divider"></div>
        <div class="bible-citation"><!-- BI_VERSE --></div>
        <div class="footer-tag" style="margin-top: 60px;">MUSICHRIS | NOTA DE VIDA</div>
    </div>

    <div id="outro">
        <div class="logo-circle-hole"></div>
        <div class="channel-name">@Musichris_Studio</div>
        <div class="cta-container">
            <div class="cta-bubble">¡Caminemos juntos en fe!</div>
            <div class="cta-subtext">Escucha la canción completa en el canal</div>
        </div>
    </div>
</body>
</html>
