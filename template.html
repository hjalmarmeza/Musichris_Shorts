<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MusiChris Clean Masterpiece v10.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream-color: #F5F5DC;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1920px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            overflow: hidden;
        }

        .container {
            width: 80%;
            max-width: 800px;
            background: rgba(10, 10, 5, 0.6);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            text-align: center;
            color: var(--cream-color);
            box-shadow: 0 50px 120px rgba(0,0,0,0.9);
            border: 1px solid rgba(245, 245, 220, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 70px; /* Más aire arriba y abajo */
        }

        .quote-container {
            font-family: var(--font-serif);
            width: 100%;
        }

        .quote { 
            font-size: 56px; 
            line-height: 1.5; /* Más espacio entre líneas */
            margin-bottom: 50px; 
            font-weight: 400;
        }

        .bible-citation { 
            font-family: var(--font-serif); 
            font-size: 38px; 
            font-style: italic; 
            opacity: 0.9;
            letter-spacing: 2px;
        }

        .divider { 
            width: 80px; 
            height: 1px; 
            background: var(--cream-color); 
            margin: 40px auto; 
            opacity: 0.3; 
        }

        .footer-tag { 
            font-family: var(--font-sans); 
            letter-spacing: 6px; 
            font-size: 20px; 
            opacity: 0.4; 
            font-weight: 300;
        }

        /* --- LOGO FIN --- */
        #outro { display: none; flex-direction: column; align-items: center; justify-content: center; }
        .logo-circle-hole { width: 320px; height: 320px; border-radius: 50%; border: 4px solid var(--cream-color); box-shadow: 0 0 50px rgba(245, 245, 220, 0.2); margin-bottom: 60px; }
        .channel-name { font-family: var(--font-serif); font-size: 74px; font-weight: 700; margin-bottom: 40px; color: var(--cream-color); }
        .cta-box { background: rgba(245, 245, 220, 0.1); padding: 40px 90px; border-radius: 100px; border: 1px solid rgba(245, 245, 220, 0.2); font-family: var(--font-serif); font-size: 46px; font-style: italic; color: var(--cream-color); }

        body.outro #main-content { display: none; }
        body.outro #outro { display: flex; }
    </style>
</head>
<body class="<!-- MODE -->">
    <div id="main-content" class="container">
        <div class="quote-container">
            <div class="quote"><span><!-- Text injected here --></span></div>
        </div>
        <div class="divider"></div>
        <div class="bible-citation"><!-- BI_VERSE --></div>
        <div class="footer-tag" style="margin-top: 50px;">MUSICHRIS | NOTA DE VIDA</div>
    </div>

    <div id="outro">
        <div class="logo-circle-hole"></div>
        <div class="channel-name">@Musichris_Studio</div>
        <div class="cta-box">¡Caminemos juntos en fe!</div>
    </div>
</body>
</html>
