<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Shorts Template Masterpiece v8.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream-color: #F5F5DC;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1920px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            overflow: hidden;
        }

        .container {
            width: 85%;
            max-width: 850px;
            background: rgba(15, 15, 10, 0.55);
            backdrop-filter: blur(20px) saturate(130%);
            border-radius: 35px;
            text-align: center;
            color: var(--cream-color);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border: 1px solid rgba(245, 245, 220, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 60px;
        }

        .quote-container {
            font-family: var(--font-serif);
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
        }

        .quote { font-size: 50px; line-height: 1.35; margin-bottom: 20px; }
        .complement { font-size: 44px; line-height: 1.3; margin-top: 10px; display: none; }
        .bible-verse { font-family: var(--font-serif); font-size: 30px; font-style: italic; opacity: 0; margin-top: 30px; }
        .divider { width: 120px; height: 1px; background: var(--cream-color); margin: 30px auto; opacity: 0.3; }
        .footer-tag { font-family: var(--font-serif); letter-spacing: 5px; font-size: 20px; opacity: 0.6; }

        /* --- VIDEO LOGO HOLE --- */
        #outro {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--cream-color);
        }

        .logo-circle-hole {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 5px solid var(--cream-color);
            box-shadow: 0 0 60px rgba(245, 245, 220, 0.2);
            margin-bottom: 50px;
            background: rgba(0,0,0,0.4); /* Backdrop for the animated logo */
        }

        .channel-name { font-family: var(--font-serif); font-size: 74px; font-weight: 700; margin-bottom: 30px; }
        .cta-box { background: rgba(245, 245, 220, 0.15); padding: 35px 80px; border-radius: 100px; border: 1px solid rgba(245, 245, 220, 0.3); font-family: var(--font-serif); font-size: 46px; font-style: italic; backdrop-filter: blur(10px); }

        .cursor { display: inline-block; width: 8px; height: 50px; background-color: var(--cream-color); margin-left: 5px; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        body.with-complement .complement { display: block; }
        body.quote-verse .bible-verse { opacity: 1; }
        body.outro #main-quote { display: none; }
        body.outro #outro { display: flex; }
    </style>
</head>
<body class="<!-- MODE -->">
    <div id="main-quote" class="container">
        <div class="quote-container">
            <div class="quote"><span><!-- Text injected here --></span><span class="<!-- CURSOR_CLASS_1 -->"></span></div>
            <div class="complement"><span><!-- COMPLEMENT_TEXT --></span><span class="<!-- CURSOR_CLASS_2 -->"></span></div>
        </div>
        <div class="bible-verse"><!-- BI_VERSE --></div>
        <div class="divider"></div>
        <div class="footer-tag">NOTA DE VIDA</div>
    </div>

    <div id="outro">
        <div class="logo-circle-hole"></div>
        <div class="channel-name">@Musichris_Studio</div>
        <div class="cta-box">¡Suscríbete y camina con fe!</div>
    </div>
</body>
</html>
