<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusiChris Short Master — IA Edition</title>
    <!-- Primero cargamos Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        body { background-color: #0A0A0A; font-family: 'Inter', sans-serif; color: #F5F5DC; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gold-glow:hover { box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); border-color: rgba(212, 175, 55, 0.6); }
        .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [songs, setSongs] = useState([]);
            const [log, setLog] = useState([]);
            const [currentYTId, setCurrentYTId] = useState(null);
            const [processing, setProcessing] = useState(false);

            useEffect(() => {
                fetch('/api/songs')
                    .then(res => res.json())
                    .then(data => setSongs(data))
                    .catch(err => setLog(prev => [...prev, "❌ API Offline o Error de Conexión"]));
            }, []);

            const startMagic = async (songId) => {
                if (processing) return;
                setProcessing(true);
                setCurrentYTId(null);
                setLog(prev => [...prev, `🎵 Iniciando Pipeline IA para: "${songId.toUpperCase()}"`]);
                
                try {
                    const res = await fetch('/api/publish', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ songId })
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error);

                    setLog(prev => [...prev, `🤖 Gemini generó mensaje único`, `🎬 Video renderizado con éxito`, `🚀 Link: https://youtu.be/${data.youtubeId}`]);
                    setCurrentYTId(data.youtubeId);
                } catch (e) {
                    setLog(prev => [...prev, `❌ ERROR: ${e.message}`]);
                }
                setProcessing(false);
            };

            const finalize = async () => {
                setLog(prev => [...prev, `🚀 PUBLICANTO EN VIVO...`]);
                try {
                    const res = await fetch('/api/confirm-publish', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ youtubeId: currentYTId })
                    });
                    await res.json();
                    setLog(prev => [...prev, `✨ ¡ESTÁ EN VIVO! ✅`]);
                    setCurrentYTId(null);
                } catch (err) {
                    setLog(prev => [...prev, `❌ ERROR: ${err.message}`]);
                }
            };

            return (
                <div className="max-w-4xl mx-auto py-10 px-4">
                    <header className="mb-12 text-center">
                        <h1 className="serif text-5xl text-[#D4AF37] mb-2 tracking-tighter">MusiChris AI</h1>
                        <p className="text-white/30 uppercase tracking-[4px] text-[10px]">Shorts Production Engine</p>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="space-y-3 overflow-y-auto max-h-[500px] pr-2">
                            {songs.map(song => (
                                <div key={song.id} className="glass p-5 rounded-2xl flex justify-between items-center gold-glow transition-all">
                                    <div>
                                        <h3 className="font-bold text-lg leading-tight">{song.title}</h3>
                                        <p className="text-[10px] opacity-40 uppercase tracking-widest">{song.album}</p>
                                    </div>
                                    <button 
                                        disabled={processing}
                                        onClick={() => startMagic(song.id)}
                                        className="bg-[#D4AF37] text-black px-5 py-2 rounded-full font-bold text-[10px] tracking-tighter disabled:opacity-30"
                                    >
                                        {processing ? '...' : 'PUBLISH'}
                                    </button>
                                </div>
                            ))}
                        </div>

                        <div className="glass p-6 rounded-3xl min-h-[400px] flex flex-col">
                            <h2 className="serif text-xl mb-4 border-b border-white/10 pb-2">Sistema Log</h2>
                            <div className="flex-1 overflow-y-auto font-mono text-[10px] space-y-2 text-white/40">
                                {log.map((l, i) => <div key={i}>{`> ${l}`}</div>)}
                            </div>
                            {currentYTId && (
                                <button 
                                    onClick={finalize}
                                    className="mt-4 w-full py-5 bg-[#D4AF37] text-black font-black rounded-2xl animate-pulse shadow-lg"
                                >
                                    🚀 LANZAR AL MUNDO
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
