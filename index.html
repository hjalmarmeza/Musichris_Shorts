<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusiChris Cloud — Elite Dashboard</title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        body { background-color: #0A0A0A; font-family: 'Inter', sans-serif; color: #F5F5DC; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .serif { font-family: 'Playfair Display', serif; }
        .gold-button { 
            background: linear-gradient(135deg, #D4AF37 0%, #B58D1E 100%);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURACIÓN BASE ---
        const REPO_OWNER = 'hjalmarmeza';
        const REPO_NAME = 'Musichris_Shorts';
        const SHEET_ID = '19zXfIiAZktXXyixZ1HdcW1IO9bOBn8S8sRPZAXUVZbE';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Hoja%202`;

        function App() {
            const [songs, setSongs] = useState([]);
            const [log, setLog] = useState([]);
            const [pat, setPat] = useState(localStorage.getItem('gh_pat') || '');
            const [isConfiguring, setIsConfiguring] = useState(!localStorage.getItem('gh_pat'));
            const [status, setStatus] = useState('IDLE'); // IDLE, WORKING, SUCCESS

            useEffect(() => {
                fetch(CSV_URL)
                    .then(res => res.text())
                    .then(text => {
                        const lines = text.split('\n').slice(1);
                        const parsed = lines.map(line => {
                            const cells = line.split(',').map(c => c.replace(/"/g, ''));
                            return {
                                album: cells[0],
                                title: cells[2],
                                id: (cells[2] || '').toLowerCase().replace(/[^a-z0-9]/g, '_')
                            };
                        }).filter(s => s.title);
                        setSongs(parsed);
                    });
            }, []);

            const triggerAction = async (songId) => {
                if (!pat) {
                    alert("⚠️ Por favor configura tu Token de GitHub primero.");
                    setIsConfiguring(true);
                    return;
                }

                setStatus('WORKING');
                setLog(prev => [`🚀 Señal enviada a la nube para: ${songId.toUpperCase()}`, ...prev]);

                try {
                    const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${pat}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            event_type: 'render_short',
                            client_payload: { songId: songId }
                        })
                    });

                    if (response.ok) {
                        setLog(prev => [`✅ MOTOR INICIADO. GitHub ya está fabricando tu video. Revisa la pestaña 'Actions' en tu GitHub en unos minutos.`, ...prev]);
                    } else {
                        throw new Error("Fallo al contactar a GitHub. Verifica tu Token.");
                    }
                } catch (err) {
                    setLog(prev => [`❌ ERROR: ${err.message}`, ...prev]);
                }
                setStatus('IDLE');
            };

            const savePat = (token) => {
                localStorage.setItem('gh_pat', token);
                setPat(token);
                setIsConfiguring(false);
            };

            return (
                <div className="max-w-xl mx-auto py-8 px-4">
                    <header className="mb-10 flex justify-between items-center">
                        <div>
                            <h1 className="serif text-4xl text-[#D4AF37] tracking-tighter">MusiChris Cloud</h1>
                            <p className="text-white/20 uppercase tracking-[4px] text-[8px] font-bold">Autoproduction Engine</p>
                        </div>
                        <button onClick={() => setIsConfiguring(true)} className="p-2 opacity-50 hover:opacity-100">⚙️</button>
                    </header>

                    {isConfiguring && (
                        <div className="glass p-6 rounded-3xl mb-8 border border-[#D4AF37]/30">
                            <h3 className="serif text-xl mb-3">Configuración de Seguridad</h3>
                            <p className="text-xs text-white/40 mb-4">Pega tu Token de Acceso (PAT) de GitHub para poder controlar el servidor desde aquí.</p>
                            <input 
                                type="password" 
                                placeholder="ghp_xxxxxxxxxxxx"
                                className="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-sm mb-4 outline-none focus:border-[#D4AF37]"
                                value={pat}
                                onChange={(e) => setPat(e.target.value)}
                            />
                            <button onClick={() => savePat(pat)} className="w-full gold-button py-3 text-black font-bold rounded-xl text-sm">GUARDAR CONFIGURACIÓN</button>
                        </div>
                    )}

                    <div className="space-y-4 mb-10">
                        <h2 className="serif text-2xl px-2">Canciones Disponibles</h2>
                        <div className="grid grid-cols-1 gap-3 max-h-[400px] overflow-y-auto pr-2">
                            {songs.map(song => (
                                <div key={song.id} className="glass p-5 rounded-2xl flex justify-between items-center border border-white/5">
                                    <div className="max-w-[180px]">
                                        <h4 className="font-bold text-sm truncate">{song.title}</h4>
                                        <p className="text-[10px] opacity-30 truncate uppercase">{song.album}</p>
                                    </div>
                                    <button 
                                        disabled={status === 'WORKING'}
                                        onClick={() => triggerAction(song.id)}
                                        className="gold-button text-black px-6 py-2 rounded-full font-black text-[11px] disabled:opacity-30 active:scale-95 transition-all"
                                    >
                                        FABRICAR SHORT
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="glass p-6 rounded-3xl">
                        <h3 className="serif text-lg mb-4 border-b border-white/5 pb-2">Status del Centro de Mando</h3>
                        <div className="h-32 overflow-y-auto space-y-2">
                            {log.map((line, i) => (
                                <div key={i} className="text-[10px] font-mono text-white/30 border-l-2 border-[#D4AF37] pl-3">
                                    {line}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
