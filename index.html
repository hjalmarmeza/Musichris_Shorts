<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MusiChris Cloud — Elite Dashboard</title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    <style>
        body { 
            background-color: #0A0A0A; 
            font-family: 'Inter', sans-serif; 
            color: #F5F5DC; 
            min-height: 100vh;
            overflow-x: hidden;
            width: 100vw;
        }
        .glass { 
            background: rgba(25, 25, 25, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .serif { font-family: 'Playfair Display', serif; }
        .gold-button { 
            background: linear-gradient(135deg, #D4AF37 0%, #B58D1E 100%);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1);
        }
        .drawer {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }
        .drawer-open { transform: translateX(0); }
        .drawer-closed { transform: translateX(100%); }
        
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        .activity-pulse { animation: pulse-gold 2s infinite; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const REPO_OWNER = 'hjalmarmeza';
        const REPO_NAME = 'Musichris_Shorts';
        const SHEET_ID = '19zXfIiAZktXXyixZ1HdcW1IO9bOBn8S8sRPZAXUVZbE';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Hoja%202`;
        const STATS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=stats`;

        function App() {
            const [songs, setSongs] = useState([]);
            const [log, setLog] = useState([]);
            const [pat, setPat] = useState(localStorage.getItem('gh_pat') || '');
            const [isConfiguring, setIsConfiguring] = useState(!localStorage.getItem('gh_pat'));
            const [isLogOpen, setIsLogOpen] = useState(false);
            const [status, setStatus] = useState('IDLE');
            const [hasNewActivity, setHasNewActivity] = useState(false);
            const [stats, setStats] = useState({ vistas: '0', subs: '0' });
            const logEndRef = useRef(null);

            useEffect(() => {
                // CARGA MAESTRA: Parseo robusto para evitar desplazamientos por comas
                fetch(CSV_URL)
                    .then(res => res.text())
                    .then(text => {
                        const lines = text.split('\n').filter(l => l.trim());
                        const parsed = lines.slice(1).map(line => {
                            // Regex que respeta comas dentro de comillas (Skill Flow Standard)
                            const cells = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                            const clean = cells.map(c => c.replace(/"/g, '').trim());
                            return {
                                album: clean[1] || 'MusiChris',
                                title: clean[2] || 'Sin Título',
                                status: (clean[4] || '').toLowerCase().trim(),
                                id: (clean[2] || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '_')
                            };
                        }).filter(s => s.title !== 'Sin Título');
                        setSongs(parsed);
                    });

                // RADAR FIX: Sincronización de nombres
                fetch(STATS_URL)
                    .then(res => res.text())
                    .then(text => {
                        const lines = text.split('\n');
                        if (lines.length > 1) {
                            const cells = lines[1].split(',').map(c => c.replace(/"/g, '').trim());
                            setStats({ vistas: cells[0] || '0', subs: cells[1] || '0' });
                        }
                    }).catch(e => console.error("Radar Error:", e));
            }, []);

            useEffect(() => {
                if (isLogOpen) {
                    setHasNewActivity(false);
                    logEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                }
            }, [log, isLogOpen]);

            const triggerAction = async (songId) => {
                if (!pat) {
                    setIsConfiguring(true);
                    return;
                }
                setStatus('WORKING');
                addLog(`🚀 Producción iniciada: ${songId}`);
                try {
                    const response = await fetch(`https://api.github.com/repos/hjalmarmeza/Musichris_Shorts/dispatches`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${pat}`,
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify({ event_type: 'render_short', client_payload: { songId } })
                    });
                    if (response.ok) addLog(`✅ GitHub recibió la orden.`);
                    else throw new Error("Acceso denegado.");
                } catch (err) { addLog(`❌ ${err.message}`); }
                setStatus('IDLE');
            };

            const addLog = (msg) => {
                setLog(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev]);
                if (!isLogOpen) setHasNewActivity(true);
            };

            return (
                <div className="w-full max-w-md mx-auto px-4 py-8 pb-32">
                    <header className="mb-8 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 rounded-2xl overflow-hidden shadow-2xl border-2 border-[#D4AF37]/30">
                                <img src="logo.png" className="w-full h-full object-cover" alt="Logo" />
                            </div>
                            <div>
                                <h1 className="serif text-2xl text-[#D4AF37] leading-none mb-1">MusiChris</h1>
                                <p className="text-[8px] uppercase tracking-[4px] text-white/20 font-black">Control Maestro</p>
                            </div>
                        </div>
                        <button onClick={() => setIsConfiguring(true)} className="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 opacity-50 hover:opacity-100 transition-all">⚙️</button>
                    </header>

                    {/* --- RADAR DE IMPACTO v15 --- */}
                    <div className="glass p-5 rounded-3xl mb-8 border-l-4 border-[#D4AF37] relative overflow-hidden">
                        <div className="flex justify-between items-center relative z-10">
                            <div>
                                <h3 className="text-[10px] uppercase tracking-[3px] text-[#D4AF37] mb-1 font-black opacity-60">Radar de Impacto</h3>
                                <p className="text-xs text-white font-medium">@Musichris_Studio</p>
                            </div>
                            <div className="flex gap-6">
                                <div className="text-center">
                                    <p className="text-xl font-black text-white leading-none">{stats.vistas}</p>
                                    <p className="text-[8px] uppercase tracking-widest text-white/30 mt-1">Vistas</p>
                                </div>
                                <div className="text-center">
                                    <p className="text-xl font-black text-white leading-none">{stats.subs}</p>
                                    <p className="text-[8px] uppercase tracking-widest text-white/30 mt-1">Subs</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {isConfiguring && (
                        <div className="glass p-6 rounded-2xl mb-8 border-[#D4AF37]/20 shadow-2xl relative z-10">
                            <h3 className="serif text-lg mb-2">Token de Seguridad</h3>
                            <input 
                                type="password" 
                                placeholder="Pega aquí tu ghp_..."
                                className="w-full bg-black/60 border border-white/5 rounded-xl p-4 text-sm mb-4 outline-none focus:border-[#D4AF37]/50 text-white"
                                value={pat}
                                onChange={(e) => setPat(e.target.value)}
                            />
                            <button onClick={() => { localStorage.setItem('gh_pat', pat); setIsConfiguring(false); }} className="w-full gold-button py-4 text-black font-black rounded-xl text-xs tracking-widest uppercase">VINCULAR DISPOSITIVO</button>
                        </div>
                    )}

                    {/* --- LISTA DE CANCIONES ELITE --- */}
                    <div className="space-y-4">
                        {songs.map(song => (
                             <div key={song.id} className="glass group relative p-5 rounded-2xl flex items-center justify-between border border-white/5 active:scale-[0.98] transition-all bg-gradient-to-br from-white/10 to-transparent">
                                <div className="flex-1 pr-4 min-w-0">
                                    <p className="text-[9px] text-[#D4AF37] opacity-60 font-black uppercase tracking-widest mb-1 truncate">{song.album}</p>
                                    <h4 className="serif text-[17px] leading-[1.2] text-white font-bold break-words">{song.title}</h4>
                                </div>
                                <div className="flex flex-col items-center gap-2 shrink-0">
                                    {song.status === 'done' && (
                                        <div className="bg-[#D4AF37] text-black text-[8px] font-black px-2 py-0.5 rounded-full shadow-lg pulse">#1 SHORT</div>
                                    )}
                                    <button 
                                        disabled={status === 'WORKING'}
                                        onClick={() => triggerAction(song.id)}
                                        className="gold-button text-black px-4 py-3 rounded-xl font-black text-[11px] tracking-tight transition-all active:scale-95 disabled:opacity-20 shadow-xl"
                                    >
                                        PRODUCIR
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* --- FLOATING LOG TAB --- */}
                    <button 
                        onClick={() => setIsLogOpen(true)}
                        className={`fixed right-0 top-1/2 -translate-y-1/2 bg-[#D4AF37] text-black p-3 rounded-l-2xl shadow-2xl z-40 flex flex-col items-center gap-2 transition-all active:scale-90 ${hasNewActivity ? 'activity-pulse pr-6' : ''}`}
                    >
                        <span className="text-xs font-black [writing-mode:vertical-lr] rotate-180 uppercase tracking-widest">ACTIVIDAD</span>
                        <span className="text-lg">📋</span>
                    </button>

                    {/* --- LOG DRAWER --- */}
                    <div className={`fixed inset-0 bg-black/60 backdrop-blur-sm z-50 transition-opacity duration-300 ${isLogOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => setIsLogOpen(false)}>
                        <div 
                            className={`fixed right-0 top-0 bottom-0 w-4/5 max-w-sm glass border-l border-white/10 p-6 flex flex-col drawer ${isLogOpen ? 'drawer-open' : 'drawer-closed'}`}
                            onClick={e => e.stopPropagation()}
                        >
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="serif text-xl text-[#D4AF37]">Historial del Motor</h3>
                                <button onClick={() => setIsLogOpen(false)} className="text-2xl opacity-50">✕</button>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                                {log.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center opacity-20 italic space-y-4">
                                        <span className="text-4xl">📡</span>
                                        <p className="text-sm">Sistema listo. Esperando comandos...</p>
                                    </div>
                                ) : log.map((line, i) => (
                                    <div key={i} className="text-[11px] font-mono text-white/50 border-l-2 border-[#D4AF37]/40 pl-3 leading-relaxed py-1 animate-in slide-in-from-right duration-300">
                                        {line}
                                    </div>
                                ))}
                                <div ref={logEndRef} />
                            </div>
                            
                            <button 
                                onClick={() => setLog([])} 
                                className="mt-6 text-[10px] uppercase tracking-widest opacity-30 hover:opacity-100 text-center"
                            >
                                Limpiar historial
                            </button>
                        </div>
                    </div>

                    <footer className="mt-12 text-center opacity-5 text-[9px] tracking-[5px] uppercase">
                        Masterpiece Engine v3.2
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
