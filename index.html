<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MusiChris Cloud — Elite Dashboard</title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        body { 
            background-color: #0A0A0A; 
            font-family: 'Inter', sans-serif; 
            color: #F5F5DC; 
            min-height: 100vh;
            overflow-x: hidden; /* Evitar el baile lateral */
            width: 100vw;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .serif { font-family: 'Playfair Display', serif; }
        .gold-button { 
            background: linear-gradient(135deg, #D4AF37 0%, #B58D1E 100%);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1);
        }
        /* Estilo para el scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const REPO_OWNER = 'hjalmarmeza';
        const REPO_NAME = 'Musichris_Shorts';
        const SHEET_ID = '19zXfIiAZktXXyixZ1HdcW1IO9bOBn8S8sRPZAXUVZbE';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Hoja%202`;

        function App() {
            const [songs, setSongs] = useState([]);
            const [log, setLog] = useState([]);
            const [pat, setPat] = useState(localStorage.getItem('gh_pat') || '');
            const [isConfiguring, setIsConfiguring] = useState(!localStorage.getItem('gh_pat'));
            const [status, setStatus] = useState('IDLE');

            useEffect(() => {
                fetch(CSV_URL)
                    .then(res => res.text())
                    .then(text => {
                        const lines = text.split('\n').slice(1);
                        const parsed = lines.map(line => {
                            const cells = line.split(',').map(c => c.replace(/"/g, ''));
                            return {
                                album: cells[0],
                                title: cells[2],
                                id: (cells[2] || '').toLowerCase().replace(/[^a-z0-9]/g, '_')
                            };
                        }).filter(s => s.title);
                        setSongs(parsed);
                    });
            }, []);

            const triggerAction = async (songId) => {
                if (!pat) {
                    setIsConfiguring(true);
                    return;
                }
                setStatus('WORKING');
                setLog(prev => [`🚀 Lanzando: ${songId}`, ...prev]);
                try {
                    const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${pat}`,
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify({ event_type: 'render_short', client_payload: { songId } })
                    });
                    if (response.ok) setLog(prev => [`✅ Petición recibida por GitHub. Renderizando...`, ...prev]);
                    else throw new Error("Acceso denegado. Revisa tu Token.");
                } catch (err) { setLog(prev => [`❌ ${err.message}`, ...prev]); }
                setStatus('IDLE');
            };

            return (
                <div className="w-full max-w-md mx-auto px-4 py-8">
                    <header className="mb-8 flex justify-between items-end">
                        <div className="animate-pulse-slow">
                            <h1 className="serif text-3xl text-[#D4AF37] leading-none mb-1">MusiChris</h1>
                            <p className="text-[10px] uppercase tracking-[3px] text-white/30 font-bold">Cloud Control</p>
                        </div>
                        <button onClick={() => setIsConfiguring(true)} className="text-xl opacity-40 hover:opacity-100 transition-opacity pb-1">⚙️</button>
                    </header>

                    {isConfiguring && (
                        <div className="glass p-6 rounded-2xl mb-8 border-[#D4AF37]/20 shadow-2xl">
                            <h3 className="serif text-lg mb-2">Token de Seguridad</h3>
                            <input 
                                type="password" 
                                placeholder="Pega aquí tu ghp_..."
                                className="w-full bg-black/60 border border-white/5 rounded-xl p-4 text-sm mb-4 outline-none focus:border-[#D4AF37]/50"
                                value={pat}
                                onChange={(e) => setPat(e.target.value)}
                            />
                            <button onClick={() => { localStorage.setItem('gh_pat', pat); setIsConfiguring(false); }} className="w-full gold-button py-4 text-black font-black rounded-xl text-xs tracking-widest uppercase">VINCULAR DISPOSITIVO</button>
                        </div>
                    )}

                    <div className="space-y-6">
                        <div className="flex justify-between items-center px-1">
                            <h2 className="serif text-xl">Canciones</h2>
                            <span className="text-[10px] bg-white/5 px-2 py-1 rounded text-white/40">{songs.length} ITEMS</span>
                        </div>
                        
                        <div className="grid gap-3">
                            {songs.map(song => (
                                <div key={song.id} className="glass p-4 rounded-xl flex items-center justify-between border-white/5">
                                    <div className="overflow-hidden mr-4">
                                        <h4 className="font-bold text-xs truncate leading-tight mb-1">{song.title}</h4>
                                        <p className="text-[9px] opacity-20 uppercase tracking-tighter truncate">{song.album}</p>
                                    </div>
                                    <button 
                                        disabled={status === 'WORKING'}
                                        onClick={() => triggerAction(song.id)}
                                        className="gold-button text-black shrink-0 px-4 py-2.5 rounded-lg font-bold text-[10px] transition-transform active:scale-90"
                                    >
                                        PRODUCIR
                                    </button>
                                </div>
                            ))}
                        </div>

                        <div className="glass p-5 rounded-2xl mt-8">
                            <p className="text-[9px] font-bold text-white/20 uppercase mb-3 tracking-widest">Actividad del Sistema</p>
                            <div className="h-28 overflow-y-auto space-y-2 text-[10px] font-mono pr-2">
                                {log.length === 0 ? <p className="opacity-10 italic">Esperando órdenes...</p> : log.map((line, i) => (
                                    <div key={i} className="text-white/40 border-l border-[#D4AF37]/50 pl-3 leading-relaxed animate-in fade-in slide-in-from-left-2 duration-500">
                                        {line}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    
                    <footer className="mt-12 text-center opacity-10 text-[9px] tracking-[5px] uppercase">
                        Masterpiece Engine v3.1
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
